<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scudo AI — Analizzatore Anti-Truffa</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b1120; --s1: #131e35; --blue: #3b82f6; --teal: #14b8a6; --txt: #f0f6ff; --txt2: #94a3b8;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 0; line-height: 1.6; }
        nav { display: flex; align-items: center; padding: 1rem 1.5rem; background: rgba(11,17,32,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); sticky; top: 0; z-index: 100; }
        .hero { text-align: center; padding: 4rem 1.5rem; }
        .card { background: var(--s1); max-width: 600px; margin: 0 auto 2rem; padding: 2rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        textarea { width: 100%; height: 150px; background: #0b1120; border: 1px solid #3b82f6; border-radius: 12px; color: white; padding: 1rem; box-sizing: border-box; font-family: inherit; margin-bottom: 1rem; }
        .btn-primary { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--blue), var(--teal)); border: none; border-radius: 12px; color: white; font-weight: 800; cursor: pointer; }
        #spinner { display: none; text-align: center; margin: 1rem 0; }
        #result-section { display: none; background: #1a2744; padding: 1.5rem; border-radius: 15px; margin-top: 1rem; border-left: 5px solid var(--blue); }
        footer { text-align: center; padding: 2rem; font-size: 0.8rem; color: var(--txt2); }
    </style>
</head>
<body>
    <nav><strong>🛡️ Scudo AI</strong></nav>
    <header class="hero">
        <h1>Proteggiti dalle <span style="color:var(--blue)">Truffe</span></h1>
        <p>Incolla un messaggio sospetto e l'IA lo analizzerà per te.</p>
    </header>

    <main style="padding: 0 1rem;">
        <div class="card">
            <textarea id="msg-input" placeholder="Incolla qui il messaggio (SMS, Email, WhatsApp)..."></textarea>
            <button class="btn-primary" id="analyze-btn" onclick="analyze()">🛡️ Analizza ora</button>
            
            <div id="spinner">Analisi in corso...</div>
            
            <div id="result-section">
                <h3 id="risk-level" style="margin-top:0">Risultato:</h3>
                <p id="risk-desc"></p>
            </div>
        </div>
    </main>

    <footer>Scudo AI by MC — Nessun dato viene salvato.</footer>

    <script>
        async function analyze() {
            const input = document.getElementById('msg-input').value.trim();
            const btn = document.getElementById('analyze-btn');
            const spinner = document.getElementById('spinner');
            const result = document.getElementById('result-section');
            const desc = document.getElementById('risk-desc');

            if (!input) return alert("Inserisci un testo!");

            btn.disabled = true;
            spinner.style.display = 'block';
            result.style.display = 'none';

            try {
                const response = await fetch("/.netlify/functions/analyze", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: input })
                });

                const data = await response.json();
                
                if (!response.ok) throw new Error(data.error || "Errore del server");

                // Gestione risposta Gemini
                const aiText = data.candidates[0].content.parts[0].text;
                desc.innerText = aiText;
                result.style.display = 'block';
            } catch (err) {
                alert("Errore: " + err.message);
                console.error(err);
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
            }
        }
    </script>
</body>
</html>
