</div>
  </main>

  <div id="install-modal">
    <div class="modal-box">
      <div class="modal-hdr">
        <div class="modal-bigico">🛡️</div>
        <div class="modal-title">Installa Scudo AI</div>
        <div class="modal-sub">Aggiungi l'app alla tua home per analizzare messaggi sospetti in un tocco.</div>
      </div>
      <div class="modal-actions">
        <button class="btn-install" id="pwa-install-btn">Installa ora</button>
        <button class="btn-close" onclick="closeInstallModal()">Chiudi</button>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-logo">Scudo <span>AI</span></div>
    <p class="footer-note">Strumento di analisi basato su Intelligenza Artificiale. Non sostituisce il parere delle autorità competenti. I dati inseriti non vengono salvati.</p>
  </footer>

  <script>
    // Gestione Tab
    function switchTab(type, btn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-text').style.display = type === 'text' ? 'block' : 'none';
      document.getElementById('panel-image').style.display = type === 'image' ? 'block' : 'none';
    }

    // Funzione principale di Analisi
    async function analyze() {
      const btn = document.getElementById('analyze-btn');
      const msgInput = document.getElementById('msg-input');
      const spinner = document.getElementById('spinner');
      const resultSection = document.getElementById('result-section');

      const text = msgInput.value.trim();
      if (!text) {
        alert("Per favore, incolla un messaggio da analizzare.");
        return;
      }

      // UI State: Caricamento
      btn.disabled = true;
      spinner.style.display = 'block';
      resultSection.style.display = 'none';

      try {
        const response = await fetch("/.netlify/functions/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: text })
        });

        const data = await response.json();

        if (!response.ok) throw new Error(data.error || "Errore sconosciuto");

        displayResults(data);
      } catch (error) {
        alert("Errore durante l'analisi: " + error.message);
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
      }
    }

    function displayResults(data) {
      const resultSection = document.getElementById('result-section');
      const gaugePct = document.getElementById('gauge-pct');
      const gaugeArc = document.getElementById('gauge-arc');
      const riskLevel = document.getElementById('risk-level');
      const riskDesc = document.getElementById('risk-desc');
      
      // Estraiamo il testo della risposta di Gemini
      // Nota: la struttura dipende da come risponde l'API v1beta
      const aiResponse = data.candidates[0].content.parts[0].text;
      
      // Semplice logica di visualizzazione (puoi espanderla)
      resultSection.style.display = 'block';
      riskDesc.innerText = aiResponse;
      riskLevel.innerText = "Analisi Completata";
      gaugePct.innerText = "AI";
      gaugeArc.style.strokeDashoffset = "0";
      
      resultSection.scrollIntoView({ behavior: 'smooth' });
    }

    function goTo(id) {
      document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
    }

    function openInstallModal() { document.getElementById('install-modal').classList.add('open'); }
    function closeInstallModal() { document.getElementById('install-modal').classList.remove('open'); }
    function togAcc(btn) {
      const body = btn.nextElementSibling;
      body.classList.toggle('open');
    }
  </script>
</body>
</html>
