<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scudo AI — Analizzatore Anti-Truffa</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#0b1120;--s1:#131e35;--s2:#1a2744;--s3:#1e2e50;
            --blue:#3b82f6;--teal:#14b8a6;--txt:#f0f6ff;--txt2:#94a3b8;
            --border:rgba(255,255,255,0.1);--r:16px;
        }
        body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--txt);line-height:1.6}
        
        /* Navbar originale */
        nav{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:70px;background:rgba(11,17,32,0.8);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
        .nav-logo{font-weight:800;font-size:1.2rem;display:flex;align-items:center;gap:8px}
        .nav-links{display:flex;gap:20px;font-size:0.9rem;color:var(--txt2)}
        .nav-links span{cursor:pointer;transition:0.2s}
        .nav-links span:hover{color:var(--txt)}

        .hero{text-align:center;padding:5rem 1rem 3rem}
        .container{max-width:800px;margin:0 auto;padding:0 1rem 5rem}

        /* Tabs Selettori */
        .tabs{display:flex;gap:10px;margin-bottom:1.5rem;background:var(--s1);padding:6px;border-radius:14px;border:1px solid var(--border)}
        .tab{flex:1;padding:12px;text-align:center;cursor:pointer;border-radius:10px;font-weight:600;transition:0.3s;color:var(--txt2)}
        .tab.active{background:var(--s2);color:white;box-shadow:0 4px 15px rgba(0,0,0,0.3)}

        .card{background:var(--s1);padding:2rem;border-radius:28px;border:1px solid var(--border);box-shadow:0 20px 40px rgba(0,0,0,0.4)}
        
        /* Input area */
        textarea{width:100%;height:160px;background:var(--bg);border:1.5px solid var(--s2);border-radius:var(--r);color:white;padding:1.2rem;font-family:inherit;font-size:1rem;margin-bottom:1.2rem;resize:none;outline:none;transition:0.3s}
        textarea:focus{border-color:var(--blue)}

        .upload-area{border:2px dashed var(--s3);padding:3.5rem 1rem;text-align:center;border-radius:var(--r);cursor:pointer;margin-bottom:1.2rem;transition:0.3s}
        .upload-area:hover{border-color:var(--blue);background:rgba(59,130,246,0.05)}

        .btn-primary{width:100%;padding:1.2rem;background:linear-gradient(135deg, var(--blue), var(--teal));border:none;border-radius:var(--r);color:white;font-weight:800;cursor:pointer;font-size:1.1rem;box-shadow:0 8px 25px rgba(59,130,246,0.3)}
        .btn-primary:disabled{opacity:0.6;cursor:not-allowed}

        #spinner{display:none;text-align:center;margin:2rem 0}
        #result-section{display:none;background:var(--s2);padding:1.8rem;border-radius:var(--r);margin-top:2rem;border-left:5px solid var(--blue);animation:fadeIn 0.5s}

        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    </style>
</head>
<body>
    <nav>
        <div class="nav-logo">🛡️ Scudo AI</div>
        <div class="nav-links">
            <span>Analisi</span>
            <span>Screenshot</span>
            <span>Autorità</span>
        </div>
    </nav>

    <div class="hero">
        <h1 style="font-size:2.8rem;margin-bottom:0.5rem">Proteggiti dalle <span style="color:var(--blue)">Truffe</span></h1>
        <p style="color:var(--txt2);font-size:1.1rem">L'intelligenza artificiale che smaschera i messaggi sospetti.</p>
    </div>

    <main class="container">
        <div class="tabs">
            <div id="tab-text" class="tab active" onclick="switchTab('text')">📩 Testo / Messaggio</div>
            <div id="tab-image" class="tab" onclick="switchTab('image')">📸 Immagine / Screenshot</div>
        </div>

        <div class="card">
            <div id="text-input-container
